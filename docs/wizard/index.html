<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JavaDucker &mdash; Interactive Guide</title>
<link rel="stylesheet" href="css/wizard.css"/>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    primaryColor: '#2E3D4F',
    primaryTextColor: '#D5DBDB',
    primaryBorderColor: '#FF9900',
    lineColor: '#879196',
    secondaryColor: '#1B2838',
    tertiaryColor: '#131A22',
    noteBkgColor: '#1B2838',
    noteTextColor: '#D5DBDB',
    noteBorderColor: '#FF9900',
    actorBkg: '#2E3D4F',
    actorBorder: '#FF9900',
    actorTextColor: '#D5DBDB',
    signalColor: '#D5DBDB',
    signalTextColor: '#D5DBDB',
    labelBoxBkgColor: '#1B2838',
    labelBoxBorderColor: '#FF9900',
    labelTextColor: '#D5DBDB',
    loopTextColor: '#FF9900',
    activationBorderColor: '#FF9900',
    activationBkgColor: '#2E3D4F',
    sequenceNumberColor: '#131A22',
    fontSize: '20px',
  },
  sequence: { mirrorActors: false, useMaxWidth: true }
});
</script>
</head>
<body>
<canvas id="particles"></canvas>

<div class="topbar">
  <div class="brand" onclick="goHome()"><div class="logo"></div><div><div class="title">JAVADUCKER</div></div></div>
  <div class="step-indicator" id="stepIndicator"></div>
  <button class="home-btn" onclick="goHome()"><span style="font-size:20px">&#8962;</span> Topics</button>
</div>

<div class="bottombar" id="bottombar" style="display:none">
  <button class="nav-btn" id="prevBtn" onclick="prevPage()">&#8592; Prev</button>
  <div class="progress-dots" id="progressDots"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="nextPage()">Next &#8594;</button>
</div>

<div class="landing active" id="landingPage">
  <div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
  <h1 class="hero-title">JavaDucker</h1>
  <p class="hero-sub">Code search &amp; retrieval server. Java 21 &bull; Spring Boot &bull; gRPC &bull; DuckDB</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-val">6</div><div class="stat-lbl">RPCs</div></div>
    <div class="stat"><div class="stat-val">5</div><div class="stat-lbl">Tables</div></div>
    <div class="stat"><div class="stat-val">3</div><div class="stat-lbl">Search Modes</div></div>
    <div class="stat"><div class="stat-val">48</div><div class="stat-lbl">Tests</div></div>
    <div class="stat"><div class="stat-val">7</div><div class="stat-lbl">CLI Commands</div></div>
  </div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<div class="page" id="pageContainer"></div>

<script src="js/wizard.js"></script>
</body>
</html>
