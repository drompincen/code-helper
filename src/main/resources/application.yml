server:
  port: 8080

spring:
  ai:
    mcp:
      server:
        name: javaducker
        version: 1.0.0
        type: SYNC

javaducker:
  db-path: data/javaducker.duckdb
  intake-dir: temp/intake
  chunk-size: 1000
  chunk-overlap: 200
  embedding-dim: 256
  ingestion-poll-seconds: 5
  max-search-results: 20

logging:
  level:
    com.javaducker: INFO
